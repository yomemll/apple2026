<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사과홍보</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f5f7f2;
      font-family:"Malgun Gothic", sans-serif;
    }
    .wrap{
      text-align:center; 
    }
    .title{
      font-size:72px;
      font-weight:800;
      color:#222;
      margin-bottom:24px;
    }
    .apple-red{
      font-size:56px;
      font-weight:700;
      color:#d62828;
      margin-bottom:12px;
    }
    .apple-green{
      font-size:56px;
      font-weight:700;
      color:#2a9d3f;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">사과홍보</div>
    <div class="apple-red">빨간사과</div>
    <div class="apple-green">초록사과1</div>
    <div class="apple-green">초록사과2</div>
    <div class="apple-green">초록사과3</div>
  </div>
</body>
</html>
